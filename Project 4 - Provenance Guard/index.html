<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <script src="scripts.js" defer></script>
  <title>Provenance Guard — Tester</title>
</head>
<body>
  <h1>Provenance Guard — API tester</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('submit')">Submit</button>
    <button class="tab" onclick="switchTab('appeal')">Appeal</button>
    <button class="tab" onclick="switchTab('log')">View log</button>
  </div>

  <div id="tab-submit" class="panel active">
    <label>Text to analyze</label>
    <textarea id="sub-text" placeholder="Paste a poem, story, or blog post here..."></textarea>
    <label>Creator ID</label>
    <input type="text" id="sub-creator" value="test-user-1" />
    <br/>
    <button class="submit-btn" onclick="doSubmit()">Submit for analysis</button>
    <div id="sub-status"></div>
    <div id="sub-result" class="result">
      <p class="attr">Attribution: <span id="r-attr"></span></p>
      <p class="attr">Confidence: <span id="r-conf"></span></p>
      <p class="attr">LLM score: <span id="r-llm"></span> &nbsp;|&nbsp; Stylometric score: <span id="r-stylo"></span></p>
      <p class="attr">Content ID: <span id="r-cid" class="cid"></span></p>
      <div class="label-text" id="r-label"></div>
    </div>
  </div>

  <div id="tab-appeal" class="panel">
    <label>Content ID (from a submit response)</label>
    <input type="text" id="app-cid" placeholder="Paste content_id here" />
    <label>Your reasoning</label>
    <textarea id="app-reason" placeholder="Explain why you believe this classification is incorrect..." style="min-height:80px;"></textarea>
    <br/>
    <button class="submit-btn" onclick="doAppeal()">Submit appeal</button>
    <div id="app-status"></div>
    <div id="app-result" class="result">
      <p class="attr">Status: <span id="a-status"></span></p>
      <p class="attr" id="a-msg"></p>
    </div>
  </div>

  <div id="tab-log" class="panel">
    <button class="submit-btn" onclick="doLog()">Fetch log</button>
    <div id="log-status"></div>
    <div id="log-result" style="margin-top:1rem;"></div>
  </div>
</body>
</html>
